<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBR Host Selector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at top, #1b2838 0%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 3rem;
            color: white;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 30px rgba(255,215,0,0.4);
        }

        .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.7rem;
        }


        /* Sync status dot */
        .sync-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .sync-dot.live   { background: #27ae60; box-shadow: 0 0 6px #27ae60; }
        .sync-dot.local  { background: #f39c12; box-shadow: 0 0 6px #f39c12; }
        .sync-dot.saving { background: #3498db; box-shadow: 0 0 6px #3498db; }

        /* Status banner */
        .status-banner {
            margin-bottom: 1.4rem;
            padding: 0.55rem 1.4rem;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            max-width: 560px;
        }

        .status-banner.round-clear {
            background: rgba(231,76,60,0.18);
            border: 1px solid rgba(231,76,60,0.4);
            color: #ff8a80;
        }

        .status-banner.round-even {
            background: rgba(39,174,96,0.18);
            border: 1px solid rgba(39,174,96,0.4);
            color: #69f0ae;
        }

        .main-layout {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .left-col { display: flex; flex-direction: column; align-items: center; }

        #dartCanvas {
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            cursor: crosshair;
        }

        .throw-btn {
            margin-top: 1.4rem;
            padding: 0.9rem 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 28px rgba(231,76,60,0.55);
        }

        .throw-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(231,76,60,0.75);
        }

        .throw-btn:disabled {
            background: linear-gradient(135deg, #444, #555);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Countdown / buildup overlay on the board */
        .buildup-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            z-index: 20;
            pointer-events: none;
        }

        .buildup-overlay.active { display: flex; }

        .buildup-name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #FFD700;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(255,215,0,0.7);
            min-height: 3rem;
            transition: opacity 0.08s;
        }

        .buildup-timer {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 0.6rem;
        }

        .buildup-bar-wrap {
            margin-top: 0.8rem;
            width: 60%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .buildup-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e74c3c, #FFD700);
            border-radius: 3px;
            transition: width 0.15s linear;
        }

        .board-container {
            position: relative;
            display: inline-block;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            width: 310px;
            max-width: 92vw;
        }

        .panel {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 1.3rem 1.5rem;
            backdrop-filter: blur(12px);
        }

        .panel-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 0.85rem;
        }

        .scoreboard-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .score-row {
            display: grid;
            grid-template-columns: 12px 1fr auto auto auto auto;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.5rem;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .score-row.eligible { background: rgba(255,255,255,0.06); }
        .score-row.locked   { opacity: 0.42; }

        .score-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        .score-name-wrap { display: flex; align-items: center; gap: 5px; }
        .score-name      { font-size: 0.85rem; font-weight: 600; }
        .lock-icon       { font-size: 0.68rem; opacity: 0.7; }

        .score-pips { display: flex; gap: 3px; flex-wrap: wrap; }

        .pip { width: 8px; height: 8px; border-radius: 50%; }
        .pip.filled { opacity: 1; }
        .pip.empty  { background: rgba(255,255,255,0.15) !important; }

        .score-num { font-size: 0.9rem; font-weight: 800; color: #FFD700; min-width: 1.2rem; text-align: center; }

        .adj-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
            width: 22px;
            height: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.12s, color 0.12s;
            flex-shrink: 0;
        }

        .adj-btn:hover { background: rgba(255,255,255,0.12); color: white; }
        .adj-btn.plus:hover { border-color: #27ae60; color: #69f0ae; }
        .adj-btn.minus:hover { border-color: #e74c3c; color: #ff8a80; }

        .scoreboard-empty { font-size: 0.78rem; color: rgba(255,255,255,0.3); font-style: italic; }

        .legend {
            margin-top: 0.9rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: rgba(255,255,255,0.4); }
        .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

        .reset-btn {
            margin-top: 0.85rem;
            width: 100%;
            padding: 0.45rem;
            background: rgba(231,76,60,0.12);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 9px;
            color: rgba(255,255,255,0.45);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .reset-btn:hover { background: rgba(231,76,60,0.3); color: white; }

        .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; min-height: 1.8rem; }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px 3px 11px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            color: white;
        }

        .tag .x {
            background: none; border: none;
            color: rgba(255,255,255,0.45);
            font-size: 1rem; line-height: 1;
            cursor: pointer; padding: 0 2px;
        }

        .tag .x:hover { color: white; }

        .add-row { display: flex; gap: 0.5rem; }

        .add-row input {
            flex: 1;
            padding: 0.55rem 0.9rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 11px;
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 0.88rem;
            font-family: inherit;
        }

        .add-row input:focus { outline: none; border-color: #FFD700; }
        .add-row input::placeholder { color: rgba(255,255,255,0.25); }

        .add-row button {
            padding: 0.55rem 0.9rem;
            background: #27ae60;
            border: none;
            border-radius: 11px;
            color: white;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .add-row button:hover { background: #219a52; }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        #overlay.show { display: flex; }

        .winner-card {
            background: linear-gradient(150deg, #1e2d50, #0e1a33);
            border: 2px solid #FFD700;
            border-radius: 28px;
            padding: 2.8rem 4.2rem;
            text-align: center;
            box-shadow: 0 0 100px rgba(255,215,0,0.25), 0 25px 70px rgba(0,0,0,0.6);
            animation: pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from { transform: scale(0.35) rotate(-6deg); opacity: 0; }
            to   { transform: scale(1) rotate(0); opacity: 1; }
        }

        .winner-emoji { font-size: 2.2rem; margin-bottom: 0.35rem; }
        .winner-label { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.4rem; }

        .winner-name {
            font-size: 3.5rem;
            font-weight: 900;
            color: #FFD700;
            letter-spacing: 5px;
            text-shadow: 0 0 50px rgba(255,215,0,0.85);
            margin-bottom: 0.3rem;
        }

        .winner-count { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin-bottom: 1.6rem; }

        .winner-close {
            padding: 0.75rem 2.5rem;
            background: #FFD700;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 800;
            color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(255,215,0,0.45);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .winner-close:hover { box-shadow: 0 7px 25px rgba(255,215,0,0.65); transform: translateY(-2px); }

        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 250; }
    </style>
</head>
<body>

<h1>WBR Host Selector</h1>
<p class="subtitle">Dart targets teams that need to host next</p>

<div class="sync-row">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">not connected</span>
</div>

<div class="status-banner" id="statusBanner"></div>

<div class="main-layout">
    <div class="left-col">
        <div class="board-container">
            <canvas id="dartCanvas" width="440" height="440"></canvas>
            <div class="buildup-overlay" id="buildupOverlay">
                <div class="buildup-name" id="buildupName"></div>
                <div class="buildup-timer" id="buildupTimer"></div>
                <div class="buildup-bar-wrap"><div class="buildup-bar" id="buildupBar"></div></div>
            </div>
        </div>
        <button class="throw-btn" id="throwBtn">THROW DART</button>
    </div>

    <div class="right-col">
        <div class="panel">
            <div class="panel-title">Host Scoreboard</div>
            <div class="scoreboard-list" id="scoreboard">
                <div class="scoreboard-empty">Loading…</div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#69f0ae"></div> Eligible this round</div>
                <div class="legend-item">🔒 Locked out</div>
            </div>
            <button class="reset-btn" onclick="resetScores()">Reset Scoreboard</button>
        </div>

        <div class="panel">
            <div class="panel-title">Teams</div>
            <div class="tags" id="tagContainer"></div>
            <div class="add-row">
                <input type="text" id="teamInput" placeholder="Add team…" maxlength="15">
                <button onclick="addTeam()">+ Add</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <div class="winner-card">
        <div class="winner-emoji">🎯</div>
        <div class="winner-label">Next WBR Host</div>
        <div class="winner-name" id="winnerName">—</div>
        <div class="winner-count" id="winnerCount"></div>
        <button class="winner-close" onclick="closeWinner()">Let's go!</button>
    </div>
</div>

<canvas id="confetti"></canvas>

<script>
/* ── Palette ─────────────────────────────────────── */
const SEG_COLORS = [
    ['#c0392b','#922b21'],
    ['#2980b9','#1f618d'],
    ['#27ae60','#1e8449'],
    ['#8e44ad','#6c3483'],
    ['#d35400','#a04000'],
    ['#16a085','#0e6655'],
    ['#e91e63','#ad1457'],
    ['#f39c12','#d68910'],
    ['#1565c0','#0d47a1'],
    ['#7f8c8d','#5d6d7e'],
];

/* ── State ───────────────────────────────────────── */
const DEFAULT_SCORES = { IAD: 2, PANAM: 2, PDX: 1, CDP: 2, HOLIDAY: 2, LRP: 2, CMH: 1 };
const BLOB_ID = '019e1887-f77d-7b97-b0bb-b6b3408f283f';
const BLOB_URL = `https://jsonblob.com/api/jsonBlob/${BLOB_ID}`;

let teams      = ['PDX', 'IAD', 'CMH', 'CDP', 'LRP', 'PANAM', 'HOLIDAY'];
let scores     = { ...DEFAULT_SCORES };
let lastWinner = null;
let pollTimer  = null;

const canvas = document.getElementById('dartCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
let dart = null, animating = false;

/* ── Sync helpers ────────────────────────────────── */
async function fbLoad() {
    try {
        const res = await fetch(BLOB_URL);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        if (data) {
            scores     = data.scores     || { ...DEFAULT_SCORES };
            lastWinner = data.lastWinner || null;
            if (data.teams && Array.isArray(data.teams)) teams = data.teams;
        }
        setSyncStatus('live', 'live sync');
        return true;
    } catch(e) {
        setSyncStatus('local', 'sync error — using local');
        return false;
    }
}

async function fbSave() {
    setSyncStatus('saving', 'saving…');
    try {
        await fetch(BLOB_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scores, lastWinner, teams }),
        });
        setSyncStatus('live', 'live sync');
        localSave();
    } catch(e) {
        setSyncStatus('local', 'sync error — saved locally');
        localSave();
    }
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
        const ok = await fbLoad();
        if (ok) { renderTags(); drawBoard(null); renderScoreboard(); updateStatus(); }
    }, 8000);
}

/* ── Sync status UI ──────────────────────────────── */
function setSyncStatus(state, label) {
    const dot = document.getElementById('syncDot');
    dot.className = `sync-dot ${state}`;
    document.getElementById('syncLabel').textContent = label;
}

/* ── Local fallback ──────────────────────────────── */
function localSave() {
    try { localStorage.setItem('wbr_v3', JSON.stringify({ scores, lastWinner, teams })); } catch(e) {}
}

function localLoad() {
    try {
        const s = localStorage.getItem('wbr_v3');
        if (s) { const d = JSON.parse(s); scores = d.scores || { ...DEFAULT_SCORES }; lastWinner = d.lastWinner || null; if (d.teams) teams = d.teams; }
        else { scores = { ...DEFAULT_SCORES }; }
    } catch(e) {}
}

/* ── Eligibility ─────────────────────────────────── */
function getMinCount() { return Math.min(...teams.map(t => scores[t] || 0)); }

function getEligibleTeams() {
    const min  = getMinCount();
    let pool   = teams.filter(t => (scores[t] || 0) === min);
    if (lastWinner && pool.length > 1) pool = pool.filter(t => t !== lastWinner);
    return pool;
}

function updateStatus() {
    const min     = getMinCount();
    const eligible = getEligibleTeams();
    const banner  = document.getElementById('statusBanner');
    const allEven = teams.every(t => (scores[t] || 0) === min);
    if (allEven) {
        banner.className = 'status-banner round-even';
        banner.textContent = `All teams even at ${min} hosting${min !== 1 ? 's' : ''} — full board active`;
    } else {
        banner.className = 'status-banner round-clear';
        banner.textContent = `Round ${min + 1}: eligible → ${eligible.join(', ')}`;
    }
}

/* ── Scoreboard ──────────────────────────────────── */
async function recordHost(team) {
    scores[team] = (scores[team] || 0) + 1;
    lastWinner   = team;
    await fbSave();
    renderScoreboard();
    updateStatus();
}

async function resetScores() {
    if (!confirm('Reset the entire scoreboard and history?')) return;
    scores = {}; lastWinner = null;
    await fbSave();
    renderScoreboard(); updateStatus(); drawBoard(null);
}

async function adjustScore(team, delta) {
    const next = Math.max(0, (scores[team] || 0) + delta);
    scores[team] = next;
    if (lastWinner === team && delta < 0) lastWinner = null;
    await fbSave();
    renderScoreboard(); updateStatus(); drawBoard(null);
}

function renderScoreboard() {
    const el       = document.getElementById('scoreboard');
    const eligible = getEligibleTeams();
    const max      = Math.max(...teams.map(t => scores[t] || 0), 1);
    const sorted   = [...teams].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));

    el.innerHTML = '';
    sorted.forEach(t => {
        const count = scores[t] || 0;
        const idx   = teams.indexOf(t);
        const color = SEG_COLORS[idx % SEG_COLORS.length][0];
        const isEl  = eligible.includes(t);
        const isLast = t === lastWinner;

        const pips = Array.from({ length: Math.max(count, max) }, (_, i) =>
            `<div class="pip ${i < count ? 'filled' : 'empty'}" style="${i < count ? `background:${color}` : ''}"></div>`
        ).join('');

        const lockReason = isLast ? '🔒 just hosted' : (!isEl ? '🔒 ahead' : '');
        const row = document.createElement('div');
        row.className = `score-row ${isEl ? 'eligible' : 'locked'}`;
        row.innerHTML = `
            <div class="score-dot" style="background:${color}"></div>
            <div class="score-name-wrap">
                <span class="score-name">${t}</span>
                ${lockReason ? `<span class="lock-icon">${lockReason}</span>` : ''}
            </div>
            <div class="score-pips">${pips}</div>
            <div class="score-num">${count}</div>
            <button class="adj-btn minus" onclick="adjustScore('${t}', -1)" title="Remove 1">−</button>
            <button class="adj-btn plus"  onclick="adjustScore('${t}',  1)" title="Add 1">+</button>
        `;
        el.appendChild(row);
    });
}

/* ── Board drawing ───────────────────────────────── */
function drawBoard(highlightTeam) {
    ctx.clearRect(0, 0, W, H);
    drawBoardInner(highlightTeam);
}

/* ── Dart ────────────────────────────────────────── */
function drawDart(x, y) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(Math.PI * 0.18);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-28,-12); ctx.lineTo(-22,0); ctx.lineTo(-28,12);
    ctx.closePath(); ctx.fillStyle = 'rgba(255,0,0,0.85)'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20,-3); ctx.lineTo(-20,3);
    ctx.closePath(); ctx.fillStyle = '#b0bec5'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,0);
    ctx.strokeStyle = '#cfd8dc'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();
    ctx.restore();
}

/* ── Color helpers ───────────────────────────────── */
function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lighten(h, a) { const [r,g,b] = hexToRgb(h); return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`; }

/* ── Throw with 20s buildup ──────────────────────── */
document.getElementById('throwBtn').addEventListener('click', throwDart);

function throwDart() {
    if (animating || teams.length < 2) return;
    const eligible = getEligibleTeams();
    if (eligible.length === 0) return;

    animating = true; dart = null;
    document.getElementById('throwBtn').disabled = true;

    const hitTeam = eligible[Math.floor(Math.random() * eligible.length)];

    // --- Phase 1: 20-second buildup with name cycling ---
    const overlay  = document.getElementById('buildupOverlay');
    const nameEl   = document.getElementById('buildupName');
    const timerEl  = document.getElementById('buildupTimer');
    const barEl    = document.getElementById('buildupBar');
    overlay.classList.add('active');

    const BUILDUP_MS = 20000;
    const buildStart = performance.now();
    let lastSwitch = 0;
    let shownTeam  = '';

    function buildupFrame(ts) {
        const elapsed = ts - buildStart;
        const progress = Math.min(elapsed / BUILDUP_MS, 1);

        // Progress bar
        barEl.style.width = (progress * 100) + '%';

        // Timer countdown
        const secsLeft = Math.ceil((BUILDUP_MS - elapsed) / 1000);
        timerEl.textContent = progress < 1 ? `${secsLeft}s` : '';

        // Name cycling: starts fast (~80ms), slows to ~600ms near the end
        const interval = 80 + (progress * progress * 520);
        if (elapsed - lastSwitch > interval) {
            lastSwitch = elapsed;
            // Pick a random team that isn't the one currently shown
            const pool = teams.filter(t => t !== shownTeam);
            // Near the end (last 2s), increasingly bias toward the real winner
            if (progress > 0.9 && Math.random() < (progress - 0.9) * 8) {
                shownTeam = hitTeam;
            } else {
                shownTeam = pool[Math.floor(Math.random() * pool.length)];
            }
            nameEl.textContent = shownTeam;
            // Flash color
            const idx = teams.indexOf(shownTeam);
            nameEl.style.color = SEG_COLORS[idx % SEG_COLORS.length][0];
        }

        // Board spins during buildup
        const spinSpeed = (1 - progress * progress) * 0.12;
        boardRotation += spinSpeed;
        drawBoardRotated(boardRotation);

        if (progress < 1) {
            requestAnimationFrame(buildupFrame);
        } else {
            // Freeze on winner name
            nameEl.textContent = hitTeam;
            const winIdx = teams.indexOf(hitTeam);
            nameEl.style.color = '#FFD700';
            timerEl.textContent = '';

            // Hold for a beat then fade out and throw
            setTimeout(() => {
                overlay.classList.remove('active');
                nameEl.style.color = '#FFD700';
                boardRotation = 0;
                launchDart(hitTeam);
            }, 1200);
        }
    }

    requestAnimationFrame(buildupFrame);
}

let boardRotation = 0;

function drawBoardRotated(rot) {
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.translate(-cx, -cy);
    drawBoardInner(null);
    ctx.restore();
}

function drawBoardInner(highlightTeam) {
    const n   = teams.length;
    const arc = (2 * Math.PI) / n;
    const R   = Math.min(cx, cy) - 4;
    const rings = [
        { r: R,        type: 'outer'  },
        { r: R * 0.78, type: 'double' },
        { r: R * 0.72, type: 'mid'    },
        { r: R * 0.46, type: 'triple' },
        { r: R * 0.40, type: 'inner'  },
    ];

    ctx.beginPath(); ctx.arc(cx, cy, R + 4, 0, 2 * Math.PI); ctx.fillStyle = '#111'; ctx.fill();

    const eligible = getEligibleTeams();

    for (let ring = 0; ring < rings.length - 1; ring++) {
        const outerR   = rings[ring].r;
        const innerR   = rings[ring + 1].r;
        const isBanded = rings[ring].type === 'double' || rings[ring].type === 'triple';

        for (let i = 0; i < n; i++) {
            const startA = arc * i - Math.PI / 2;
            const endA   = startA + arc;
            const pair   = SEG_COLORS[i % SEG_COLORS.length];
            const teamEl = eligible.includes(teams[i]);
            let color    = (i % 2 === 0) ? pair[0] : pair[1];
            if (isBanded) color = lighten(color, 35);
            if (highlightTeam && teams[i] === highlightTeam) color = lighten(color, 60);

            ctx.save();
            ctx.globalAlpha = teamEl ? 1 : 0.22;
            ctx.beginPath();
            ctx.arc(cx, cy, outerR, startA, endA);
            ctx.arc(cx, cy, innerR, endA, startA, true);
            ctx.closePath();
            ctx.fillStyle = color; ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 1.2; ctx.stroke();

            if (ring === 0) {
                const midA   = startA + arc / 2;
                const labelR = (outerR + innerR) / 2;
                ctx.translate(cx + Math.cos(midA) * labelR, cy + Math.sin(midA) * labelR);
                ctx.rotate(midA + Math.PI / 2);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const fs = Math.max(9, Math.min(16, 210 / n));
                ctx.font = `700 ${fs}px 'Segoe UI', sans-serif`;
                ctx.fillStyle = 'white'; ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 5;
                ctx.fillText(teams[i], 0, 0);
                if (!teamEl) { ctx.font = `${fs * 0.75}px sans-serif`; ctx.fillText('🔒', 0, fs + 3); }
            }
            ctx.restore();
        }
    }

    const bullOuter = rings[rings.length - 1].r;
    const bullInner = bullOuter * 0.45;

    ctx.beginPath(); ctx.arc(cx, cy, bullOuter, 0, 2 * Math.PI);
    ctx.fillStyle = highlightTeam ? '#a8e063' : '#27ae60'; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx, cy, bullInner, 0, 2 * Math.PI);
    ctx.fillStyle = highlightTeam ? '#ff6b6b' : '#c0392b'; ctx.fill();

    for (let i = 0; i < n; i++) {
        const a = arc * i - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * bullOuter, cy + Math.sin(a) * bullOuter);
        ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
        ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1.2; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2 * Math.PI);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 5; ctx.stroke();

    if (dart) drawDart(dart.x, dart.y);
}

// --- Phase 2: dart flies in after buildup ---
function launchDart(hitTeam) {
    const n        = teams.length;
    const arc      = 2 * Math.PI / n;
    const teamIdx  = teams.indexOf(hitTeam);
    const segStart = arc * teamIdx - Math.PI / 2;
    const hitAngle = segStart + arc * (0.15 + Math.random() * 0.7);
    const R        = Math.min(cx, cy) - 4;
    const dist     = R * 0.30 + Math.random() * R * 0.55;
    const landX    = cx + Math.cos(hitAngle) * dist;
    const landY    = cy + Math.sin(hitAngle) * dist;

    const startX = W + 60, startY = -60;
    const duration = 500;
    let startTs = null;

    function easeOut(t) { return 1 - Math.pow(1 - t, 2.5); }

    function fly(ts) {
        if (!startTs) startTs = ts;
        const t = Math.min((ts - startTs) / duration, 1);
        const e = easeOut(t);
        drawBoard(null);
        drawDart(startX + (landX - startX) * e, startY + (landY - startY) * e);
        if (t < 1) {
            requestAnimationFrame(fly);
        } else {
            dart = { x: landX, y: landY };
            drawBoard(hitTeam);
            setTimeout(async () => {
                animating = false;
                document.getElementById('throwBtn').disabled = false;
                await recordHost(hitTeam);
                announceWinner(hitTeam);
            }, 800);
        }
    }

    requestAnimationFrame(fly);
}

/* ── Winner overlay ──────────────────────────────── */
function announceWinner(team) {
    const count = scores[team];
    const ordinal = count === 1 ? '1st time hosting!' : count === 2 ? '2nd time hosting!' :
                    count === 3 ? '3rd time hosting!' : `${count}th time hosting!`;
    document.getElementById('winnerName').textContent  = team;
    document.getElementById('winnerCount').textContent = ordinal;
    document.getElementById('overlay').classList.add('show');
    launchConfetti();
}

function closeWinner() {
    document.getElementById('overlay').classList.remove('show');
    stopConfetti();
}

/* ── Team management ─────────────────────────────── */
function renderTags() {
    const c = document.getElementById('tagContainer');
    c.innerHTML = '';
    teams.forEach((t, i) => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.style.background = SEG_COLORS[i % SEG_COLORS.length][0];
        tag.innerHTML = `${t} <button class="x" onclick="removeTeam(${i})">×</button>`;
        c.appendChild(tag);
    });
}

async function addTeam() {
    const inp  = document.getElementById('teamInput');
    const name = inp.value.trim().toUpperCase();
    if (!name || teams.includes(name)) { inp.value = ''; return; }
    teams.push(name); inp.value = ''; dart = null;
    await fbSave();
    renderTags(); drawBoard(null); renderScoreboard(); updateStatus();
}

async function removeTeam(i) {
    if (teams.length <= 2) { alert('Need at least 2 teams!'); return; }
    const removed = teams.splice(i, 1)[0];
    delete scores[removed];
    if (lastWinner === removed) lastWinner = null;
    dart = null;
    await fbSave();
    renderTags(); drawBoard(null); renderScoreboard(); updateStatus();
}

document.getElementById('teamInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTeam(); });

/* ── Confetti ────────────────────────────────────── */
const confCvs = document.getElementById('confetti');
const confCtx = confCvs.getContext('2d');
let particles = [], confAnimId = null;

function launchConfetti() {
    confCvs.width = window.innerWidth; confCvs.height = window.innerHeight;
    const colors = SEG_COLORS.map(p => p[0]);
    particles = Array.from({ length: 200 }, () => ({
        x: Math.random() * confCvs.width, y: -20 - Math.random() * 150,
        vx: (Math.random()-0.5)*7, vy: 2.5+Math.random()*5,
        size: 6+Math.random()*8,
        color: colors[Math.floor(Math.random()*colors.length)],
        rot: Math.random()*360, rotV: (Math.random()-0.5)*10,
    }));
    if (confAnimId) cancelAnimationFrame(confAnimId);
    animateConfetti();
}

function animateConfetti() {
    confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.rot+=p.rotV;
        confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
        confCtx.fillStyle=p.color; confCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.5);
        confCtx.restore();
    });
    particles = particles.filter(p => p.y < confCvs.height + 40);
    if (particles.length > 0) confAnimId = requestAnimationFrame(animateConfetti);
}

function stopConfetti() {
    if (confAnimId) cancelAnimationFrame(confAnimId);
    confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    particles = [];
}

/* ── Init ────────────────────────────────────────── */
async function init() {
    localLoad();
    await fbLoad();
    startPolling();
    renderTags(); drawBoard(null); renderScoreboard(); updateStatus();
}

init();
</script>
