<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBR Host Selector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at top, #1b2838 0%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.8rem 1rem 3rem;
            color: white;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 30px rgba(255,215,0,0.4);
        }

        .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.7rem;
        }

        .sync-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1px;
        }

        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #555; transition: background 0.3s;
        }

        .sync-dot.live   { background: #27ae60; box-shadow: 0 0 6px #27ae60; }
        .sync-dot.local  { background: #f39c12; box-shadow: 0 0 6px #f39c12; }
        .sync-dot.saving { background: #3498db; box-shadow: 0 0 6px #3498db; }

        .status-banner {
            margin-bottom: 1.2rem;
            padding: 0.5rem 1.3rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            max-width: 560px;
        }

        .status-banner.round-clear {
            background: rgba(231,76,60,0.18);
            border: 1px solid rgba(231,76,60,0.4);
            color: #ff8a80;
        }

        .status-banner.round-even {
            background: rgba(39,174,96,0.18);
            border: 1px solid rgba(39,174,96,0.4);
            color: #69f0ae;
        }

        .main-layout {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .left-col { display: flex; flex-direction: column; align-items: center; }

        #wheelCanvas {
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }

        .spin-btn {
            margin-top: 1.4rem;
            padding: 0.9rem 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #27ae60, #1e8449);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 28px rgba(39,174,96,0.55);
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(39,174,96,0.75);
        }

        .spin-btn:disabled {
            background: linear-gradient(135deg, #444, #555);
            box-shadow: none;
            cursor: not-allowed;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            width: 310px;
            max-width: 92vw;
        }

        .panel {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 1.3rem 1.5rem;
            backdrop-filter: blur(12px);
        }

        .panel-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 0.85rem;
        }

        .scoreboard-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .score-row {
            display: grid;
            grid-template-columns: 12px 1fr auto auto auto auto;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.5rem;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .score-row.eligible { background: rgba(255,255,255,0.06); }
        .score-row.locked   { opacity: 0.42; }

        .score-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .score-name-wrap { display: flex; align-items: center; gap: 5px; }
        .score-name { font-size: 0.85rem; font-weight: 600; }
        .lock-icon  { font-size: 0.68rem; opacity: 0.7; }
        .score-pips { display: flex; gap: 3px; flex-wrap: wrap; }
        .pip { width: 8px; height: 8px; border-radius: 50%; }
        .pip.filled { opacity: 1; }
        .pip.empty  { background: rgba(255,255,255,0.15) !important; }
        .score-num { font-size: 0.9rem; font-weight: 800; color: #FFD700; min-width: 1.2rem; text-align: center; }

        .adj-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
            width: 22px; height: 22px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.12s, color 0.12s;
            flex-shrink: 0;
        }

        .adj-btn:hover { background: rgba(255,255,255,0.12); color: white; }
        .adj-btn.plus:hover { border-color: #27ae60; color: #69f0ae; }
        .adj-btn.minus:hover { border-color: #e74c3c; color: #ff8a80; }

        .scoreboard-empty { font-size: 0.78rem; color: rgba(255,255,255,0.3); font-style: italic; }

        .legend {
            margin-top: 0.9rem; padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 0.8rem; flex-wrap: wrap;
        }

        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: rgba(255,255,255,0.4); }
        .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

        .reset-btn {
            margin-top: 0.85rem; width: 100%; padding: 0.45rem;
            background: rgba(231,76,60,0.12);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 9px;
            color: rgba(255,255,255,0.45);
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer;
        }

        .reset-btn:hover { background: rgba(231,76,60,0.3); color: white; }

        .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; min-height: 1.8rem; }

        .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 8px 3px 11px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 700; color: white;
        }

        .tag .x {
            background: none; border: none;
            color: rgba(255,255,255,0.45);
            font-size: 1rem; line-height: 1;
            cursor: pointer; padding: 0 2px;
        }

        .tag .x:hover { color: white; }

        .add-row { display: flex; gap: 0.5rem; }

        .add-row input {
            flex: 1; padding: 0.55rem 0.9rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 11px;
            background: rgba(255,255,255,0.06);
            color: white; font-size: 0.88rem; font-family: inherit;
        }

        .add-row input:focus { outline: none; border-color: #FFD700; }
        .add-row input::placeholder { color: rgba(255,255,255,0.25); }

        .add-row button {
            padding: 0.55rem 0.9rem; background: #27ae60;
            border: none; border-radius: 11px;
            color: white; font-weight: 700; font-size: 0.82rem;
            cursor: pointer; white-space: nowrap;
        }

        .add-row button:hover { background: #219a52; }

        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.82);
            align-items: center; justify-content: center; z-index: 300;
        }

        #overlay.show { display: flex; }

        .winner-card {
            background: linear-gradient(150deg, #1e2d50, #0e1a33);
            border: 2px solid #FFD700; border-radius: 28px;
            padding: 2.8rem 4.2rem; text-align: center;
            box-shadow: 0 0 100px rgba(255,215,0,0.25), 0 25px 70px rgba(0,0,0,0.6);
            animation: pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from { transform: scale(0.35) rotate(-6deg); opacity: 0; }
            to   { transform: scale(1) rotate(0); opacity: 1; }
        }

        .winner-emoji { font-size: 2.2rem; margin-bottom: 0.35rem; }
        .winner-label { font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 0.4rem; }

        .winner-name {
            font-size: 3.5rem; font-weight: 900; color: #FFD700;
            letter-spacing: 5px;
            text-shadow: 0 0 50px rgba(255,215,0,0.85);
            margin-bottom: 0.3rem;
        }

        .winner-count { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin-bottom: 1.6rem; }

        .winner-close {
            padding: 0.75rem 2.5rem; background: #FFD700;
            border: none; border-radius: 50px;
            font-size: 0.95rem; font-weight: 800; color: #1a1a2e;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(255,215,0,0.45);
        }

        .winner-close:hover { box-shadow: 0 7px 25px rgba(255,215,0,0.65); transform: translateY(-2px); }

        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 250; }
    </style>
</head>
<body>

<h1>WBR Host Selector</h1>
<p class="subtitle">Roulette picks the next host</p>

<div class="sync-row">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">not connected</span>
</div>

<div class="status-banner" id="statusBanner"></div>

<div class="main-layout">
    <div class="left-col">
        <canvas id="wheelCanvas" width="480" height="480"></canvas>
        <button class="spin-btn" id="spinBtn">SPIN</button>
    </div>

    <div class="right-col">
        <div class="panel">
            <div class="panel-title">Host Scoreboard</div>
            <div class="scoreboard-list" id="scoreboard">
                <div class="scoreboard-empty">Loading…</div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#69f0ae"></div> Eligible</div>
                <div class="legend-item">🔒 Locked</div>
            </div>
            <button class="reset-btn" onclick="resetScores()">Reset Scoreboard</button>
        </div>

        <div class="panel">
            <div class="panel-title">Teams</div>
            <div class="tags" id="tagContainer"></div>
            <div class="add-row">
                <input type="text" id="teamInput" placeholder="Add team…" maxlength="15">
                <button onclick="addTeam()">+ Add</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <div class="winner-card">
        <div class="winner-emoji">🎰</div>
        <div class="winner-label">Next WBR Host</div>
        <div class="winner-name" id="winnerName">—</div>
        <div class="winner-count" id="winnerCount"></div>
        <button class="winner-close" onclick="closeWinner()">Let's go!</button>
    </div>
</div>

<canvas id="confetti"></canvas>

<script>
/* ── Palette ─────────────────────────────────────── */
const SEG_COLORS = [
    '#c0392b', '#2980b9', '#27ae60', '#8e44ad',
    '#d35400', '#16a085', '#e91e63', '#f39c12',
    '#1565c0', '#7f8c8d', '#00897b', '#6c3483',
];

/* ── State ───────────────────────────────────────── */
const DEFAULT_SCORES = { IAD: 2, PANAM: 2, PDX: 1, CDP: 2, HOLIDAY: 2, LRP: 2, CMH: 1 };
const BLOB_ID = '019e1887-f77d-7b97-b0bb-b6b3408f283f';
const BLOB_URL = `https://jsonblob.com/api/jsonBlob/${BLOB_ID}`;

let teams      = ['PDX', 'IAD', 'CMH', 'CDP', 'LRP', 'PANAM', 'HOLIDAY'];
let scores     = { ...DEFAULT_SCORES };
let lastWinner = null;
let pollTimer  = null;

const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
const BOARD_R = Math.min(cx, cy) - 12;

let animating = false;
let ballAngle = null;
let highlightedTeam = null;

/* ── Sync ────────────────────────────────────────── */
async function fbLoad() {
    try {
        const res = await fetch(BLOB_URL);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        if (data) {
            scores = data.scores || { ...DEFAULT_SCORES };
            lastWinner = data.lastWinner || null;
            if (data.teams && Array.isArray(data.teams)) teams = data.teams;
        }
        setSyncStatus('live', 'live sync');
        return true;
    } catch(e) { setSyncStatus('local', 'sync error'); return false; }
}

async function fbSave() {
    setSyncStatus('saving', 'saving…');
    try {
        await fetch(BLOB_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scores, lastWinner, teams }),
        });
        setSyncStatus('live', 'live sync'); localSave();
    } catch(e) { setSyncStatus('local', 'sync error'); localSave(); }
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
        if (animating) return;
        const ok = await fbLoad();
        if (ok) { renderTags(); draw(); renderScoreboard(); updateStatus(); }
    }, 8000);
}

function setSyncStatus(s, l) {
    document.getElementById('syncDot').className = `sync-dot ${s}`;
    document.getElementById('syncLabel').textContent = l;
}

function localSave() {
    try { localStorage.setItem('wbr_v4', JSON.stringify({ scores, lastWinner, teams })); } catch(e) {}
}

function localLoad() {
    try {
        const s = localStorage.getItem('wbr_v4');
        if (s) { const d = JSON.parse(s); scores = d.scores || { ...DEFAULT_SCORES }; lastWinner = d.lastWinner || null; if (d.teams) teams = d.teams; }
        else { scores = { ...DEFAULT_SCORES }; }
    } catch(e) {}
}

/* ── Eligibility ─────────────────────────────────── */
function getMinCount() { return Math.min(...teams.map(t => scores[t] || 0)); }

function getEligibleTeams() {
    const min = getMinCount();
    let pool = teams.filter(t => (scores[t] || 0) === min);
    if (lastWinner && pool.length > 1) pool = pool.filter(t => t !== lastWinner);
    return pool;
}

function updateStatus() {
    const min = getMinCount();
    const eligible = getEligibleTeams();
    const banner = document.getElementById('statusBanner');
    if (teams.every(t => (scores[t] || 0) === min)) {
        banner.className = 'status-banner round-even';
        banner.textContent = `All teams even at ${min} hosting${min !== 1 ? 's' : ''} — full board active`;
    } else {
        banner.className = 'status-banner round-clear';
        banner.textContent = `Round ${min + 1}: eligible → ${eligible.join(', ')}`;
    }
}

/* ── Scoreboard ──────────────────────────────────── */
async function recordHost(team) {
    scores[team] = (scores[team] || 0) + 1;
    lastWinner = team;
    await fbSave();
    renderScoreboard(); updateStatus();
}

async function resetScores() {
    if (!confirm('Reset the entire scoreboard?')) return;
    scores = {}; lastWinner = null;
    await fbSave();
    renderScoreboard(); updateStatus(); draw();
}

async function adjustScore(team, delta) {
    scores[team] = Math.max(0, (scores[team] || 0) + delta);
    if (lastWinner === team && delta < 0) lastWinner = null;
    await fbSave();
    renderScoreboard(); updateStatus(); draw();
}

function renderScoreboard() {
    const el = document.getElementById('scoreboard');
    const eligible = getEligibleTeams();
    const max = Math.max(...teams.map(t => scores[t] || 0), 1);
    const sorted = [...teams].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
    el.innerHTML = '';
    sorted.forEach(t => {
        const count = scores[t] || 0;
        const idx = teams.indexOf(t);
        const color = SEG_COLORS[idx % SEG_COLORS.length];
        const isEl = eligible.includes(t);
        const isLast = t === lastWinner;
        const pips = Array.from({ length: Math.max(count, max) }, (_, i) =>
            `<div class="pip ${i < count ? 'filled' : 'empty'}" style="${i < count ? `background:${color}` : ''}"></div>`
        ).join('');
        const lockReason = isLast ? '🔒 last' : (!isEl ? '🔒 ahead' : '');
        const row = document.createElement('div');
        row.className = `score-row ${isEl ? 'eligible' : 'locked'}`;
        row.innerHTML = `
            <div class="score-dot" style="background:${color}"></div>
            <div class="score-name-wrap">
                <span class="score-name">${t}</span>
                ${lockReason ? `<span class="lock-icon">${lockReason}</span>` : ''}
            </div>
            <div class="score-pips">${pips}</div>
            <div class="score-num">${count}</div>
            <button class="adj-btn minus" onclick="adjustScore('${t}',-1)">−</button>
            <button class="adj-btn plus"  onclick="adjustScore('${t}', 1)">+</button>
        `;
        el.appendChild(row);
    });
}

/* ── Drawing ─────────────────────────────────────── */
function draw() {
    ctx.clearRect(0, 0, W, H);

    const n   = teams.length;
    const arc = (2 * Math.PI) / n;
    const eligible = getEligibleTeams();

    // Outer rim (where ball rolls)
    ctx.beginPath();
    ctx.arc(cx, cy, BOARD_R + 10, 0, 2 * Math.PI);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, BOARD_R + 10, 0, 2 * Math.PI);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Segment pockets along the rim
    for (let i = 0; i < n; i++) {
        const a1 = arc * i - Math.PI / 2;
        const a2 = a1 + arc;
        const mid = a1 + arc / 2;
        const isEl = eligible.includes(teams[i]);

        // Pocket notch on the rim
        const pocketR = BOARD_R + 6;
        ctx.beginPath();
        ctx.arc(cx, cy, pocketR, a1 + 0.02, a2 - 0.02);
        ctx.arc(cx, cy, BOARD_R - 2, a2 - 0.02, a1 + 0.02, true);
        ctx.closePath();
        const color = SEG_COLORS[i % SEG_COLORS.length];
        ctx.fillStyle = (highlightedTeam === teams[i]) ? lighten(color, 80) : color;
        ctx.globalAlpha = isEl ? 1 : 0.25;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
    }

    // Inner wheel face
    const innerR = BOARD_R - 4;
    const faceGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
    faceGrad.addColorStop(0, '#1a252f');
    faceGrad.addColorStop(0.7, '#0f1923');
    faceGrad.addColorStop(1, '#0a0f14');
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, 2 * Math.PI);
    ctx.fillStyle = faceGrad;
    ctx.fill();

    // Pie segments inside
    for (let i = 0; i < n; i++) {
        const a1 = arc * i - Math.PI / 2;
        const a2 = a1 + arc;
        const isEl = eligible.includes(teams[i]);
        const color = SEG_COLORS[i % SEG_COLORS.length];

        ctx.save();
        ctx.globalAlpha = isEl ? 0.65 : 0.1;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, innerR - 2, a1, a2);
        ctx.closePath();
        ctx.fillStyle = (highlightedTeam === teams[i]) ? lighten(color, 40) : color;
        ctx.fill();
        ctx.restore();

        // Divider line
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a1) * (innerR - 2), cy + Math.sin(a1) * (innerR - 2));
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Team label
        const mid = a1 + arc / 2;
        const labelR = innerR * 0.6;
        ctx.save();
        ctx.globalAlpha = isEl ? 1 : 0.25;
        ctx.translate(cx + Math.cos(mid) * labelR, cy + Math.sin(mid) * labelR);
        ctx.rotate(mid + Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const fs = Math.max(10, Math.min(16, 220 / n));
        ctx.font = `800 ${fs}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'rgba(0,0,0,0.9)';
        ctx.shadowBlur = 5;
        ctx.fillText(teams[i], 0, 0);
        ctx.restore();

        // Lock icon
        if (!isEl) {
            ctx.save();
            ctx.globalAlpha = 0.5;
            ctx.translate(cx + Math.cos(mid) * labelR, cy + Math.sin(mid) * labelR);
            ctx.rotate(mid + Math.PI / 2);
            ctx.font = `${fs * 0.7}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🔒', 0, fs + 2);
            ctx.restore();
        }
    }

    // Center hub
    const hubGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    hubGrad.addColorStop(0, '#2c3e50');
    hubGrad.addColorStop(1, '#1a252f');
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
    ctx.fillStyle = hubGrad;
    ctx.fill();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.font = '700 10px "Segoe UI", sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('WBR', cx, cy);

    // Draw ball if present
    if (ballAngle !== null) drawBall(ballAngle);
}

function drawBall(angle) {
    const ballR = BOARD_R + 3;
    const bx = cx + Math.cos(angle) * ballR;
    const by = cy + Math.sin(angle) * ballR;

    // Glow
    ctx.beginPath();
    ctx.arc(bx, by, 14, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();

    // Ball shadow
    ctx.beginPath();
    ctx.arc(bx + 1, by + 1, 9, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fill();

    // Ball
    const ballGrad = ctx.createRadialGradient(bx - 2, by - 2, 1, bx, by, 9);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(0.6, '#e0e0e0');
    ballGrad.addColorStop(1, '#aaaaaa');
    ctx.beginPath();
    ctx.arc(bx, by, 8, 0, 2 * Math.PI);
    ctx.fillStyle = ballGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Shine
    ctx.beginPath();
    ctx.arc(bx - 2, by - 3, 2.5, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
}

function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lighten(h, a) { const [r,g,b] = hexToRgb(h); return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`; }

/* ── Roulette spin ───────────────────────────────── */
document.getElementById('spinBtn').addEventListener('click', spin);

function spin() {
    if (animating || teams.length < 2) return;
    const eligible = getEligibleTeams();
    if (eligible.length === 0) return;

    animating = true;
    highlightedTeam = null;
    document.getElementById('spinBtn').disabled = true;

    const hitTeam = eligible[Math.floor(Math.random() * eligible.length)];

    // Build an array of eligible segment center angles (where ball can visit)
    const n = teams.length;
    const arc = (2 * Math.PI) / n;
    const eligibleAngles = [];
    for (let i = 0; i < n; i++) {
        if (eligible.includes(teams[i])) {
            eligibleAngles.push({
                team: teams[i],
                angle: arc * i - Math.PI / 2 + arc / 2,
                idx: i,
            });
        }
    }

    // The ball hops through eligible segments only
    // Total hops: many fast ones, slowing down, ending on the winner
    const winnerEntry = eligibleAngles.find(e => e.team === hitTeam);
    const winnerPos = eligibleAngles.indexOf(winnerEntry);
    const totalHops = 30 + Math.floor(Math.random() * 15); // 30-44 hops
    // Build the hop sequence: cycle through eligible, ending on winner
    const hopSequence = [];
    let cursor = Math.floor(Math.random() * eligibleAngles.length);
    for (let h = 0; h < totalHops; h++) {
        // Last hop must land on winner
        if (h === totalHops - 1) {
            hopSequence.push(winnerEntry);
        } else {
            hopSequence.push(eligibleAngles[cursor % eligibleAngles.length]);
            cursor++;
        }
    }

    const DURATION = 15000;
    const startTs = performance.now();
    let currentHop = -1;

    // Audio tick
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tick(pitch) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = pitch;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.06);
    }

    // Timing: each hop gets progressively longer
    // Use a power curve so early hops are fast, late hops are slow
    const hopTimes = [];
    let totalWeight = 0;
    for (let h = 0; h < totalHops; h++) {
        const w = 1 + Math.pow(h / totalHops, 3) * 12;
        hopTimes.push(w);
        totalWeight += w;
    }
    // Normalize to DURATION
    const hopTimestamps = [0];
    let cumulative = 0;
    for (let h = 0; h < totalHops; h++) {
        cumulative += (hopTimes[h] / totalWeight) * DURATION;
        hopTimestamps.push(cumulative);
    }

    function frame() {
        const elapsed = performance.now() - startTs;

        // Determine which hop we're on
        let hopIdx = 0;
        for (let h = 0; h < totalHops; h++) {
            if (elapsed >= hopTimestamps[h]) hopIdx = h;
        }

        // How far between current hop and next (for smooth interpolation)
        const hopStart = hopTimestamps[hopIdx];
        const hopEnd = hopTimestamps[Math.min(hopIdx + 1, totalHops)];
        const hopDur = hopEnd - hopStart;
        const hopT = hopDur > 0 ? Math.min((elapsed - hopStart) / hopDur, 1) : 1;
        // Smooth step for the transition
        const smooth = hopT * hopT * (3 - 2 * hopT);

        const curEntry = hopSequence[hopIdx];
        const nextEntry = hopSequence[Math.min(hopIdx + 1, totalHops - 1)];

        // Interpolate angle (handle wraparound)
        let fromA = curEntry.angle;
        let toA = nextEntry.angle;
        let diff = toA - fromA;
        if (diff > Math.PI) diff -= 2 * Math.PI;
        if (diff < -Math.PI) diff += 2 * Math.PI;
        ballAngle = fromA + diff * smooth;

        // Tick when entering a new hop
        if (hopIdx !== currentHop) {
            currentHop = hopIdx;
            highlightedTeam = curEntry.team;
            const pitch = hopIdx === totalHops - 1 ? 1200 : 700 + Math.random() * 400;
            tick(pitch);
        }

        draw();

        if (elapsed < DURATION) {
            requestAnimationFrame(frame);
        } else {
            // Settled
            ballAngle = winnerEntry.angle;
            highlightedTeam = hitTeam;
            draw();

            setTimeout(async () => {
                animating = false;
                document.getElementById('spinBtn').disabled = false;
                await recordHost(hitTeam);
                announceWinner(hitTeam);
            }, 1000);
        }
    }

    requestAnimationFrame(frame);
}

/* ── Winner overlay ──────────────────────────────── */
function announceWinner(team) {
    const count = scores[team];
    const ordinal = count === 1 ? '1st time hosting!' : count === 2 ? '2nd time hosting!' :
                    count === 3 ? '3rd time hosting!' : `${count}th time hosting!`;
    document.getElementById('winnerName').textContent = team;
    document.getElementById('winnerCount').textContent = ordinal;
    document.getElementById('overlay').classList.add('show');
    launchConfetti();
}

function closeWinner() {
    document.getElementById('overlay').classList.remove('show');
    stopConfetti();
}

/* ── Team management ─────────────────────────────── */
function renderTags() {
    const c = document.getElementById('tagContainer');
    c.innerHTML = '';
    teams.forEach((t, i) => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.style.background = SEG_COLORS[i % SEG_COLORS.length];
        tag.innerHTML = `${t} <button class="x" onclick="removeTeam(${i})">×</button>`;
        c.appendChild(tag);
    });
}

async function addTeam() {
    const inp = document.getElementById('teamInput');
    const name = inp.value.trim().toUpperCase();
    if (!name || teams.includes(name)) { inp.value = ''; return; }
    teams.push(name); inp.value = ''; ballAngle = null; highlightedTeam = null;
    await fbSave();
    renderTags(); draw(); renderScoreboard(); updateStatus();
}

async function removeTeam(i) {
    if (teams.length <= 2) { alert('Need at least 2 teams!'); return; }
    const removed = teams.splice(i, 1)[0];
    delete scores[removed];
    if (lastWinner === removed) lastWinner = null;
    ballAngle = null; highlightedTeam = null;
    await fbSave();
    renderTags(); draw(); renderScoreboard(); updateStatus();
}

document.getElementById('teamInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTeam(); });

/* ── Confetti ────────────────────────────────────── */
const confCvs = document.getElementById('confetti');
const confCtx = confCvs.getContext('2d');
let particles = [], confAnimId = null;

function launchConfetti() {
    confCvs.width = window.innerWidth; confCvs.height = window.innerHeight;
    particles = Array.from({ length: 200 }, () => ({
        x: Math.random() * confCvs.width, y: -20 - Math.random() * 150,
        vx: (Math.random()-0.5)*7, vy: 2.5+Math.random()*5,
        size: 6+Math.random()*8,
        color: SEG_COLORS[Math.floor(Math.random()*SEG_COLORS.length)],
        rot: Math.random()*360, rotV: (Math.random()-0.5)*10,
    }));
    if (confAnimId) cancelAnimationFrame(confAnimId);
    animateConfetti();
}

function animateConfetti() {
    confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.rot+=p.rotV;
        confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
        confCtx.fillStyle=p.color; confCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.5);
        confCtx.restore();
    });
    particles = particles.filter(p => p.y < confCvs.height + 40);
    if (particles.length > 0) confAnimId = requestAnimationFrame(animateConfetti);
}

function stopConfetti() {
    if (confAnimId) cancelAnimationFrame(confAnimId);
    confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    particles = [];
}

/* ── Init ────────────────────────────────────────── */
async function init() {
    localLoad();
    await fbLoad();
    startPolling();
    renderTags(); draw(); renderScoreboard(); updateStatus();
}

init();
</script>
